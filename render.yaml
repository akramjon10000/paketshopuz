services:
  # Frontend - Static Site
  - type: web
    name: paketshop-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: VITE_API_URL
        value: https://paketshop-api.onrender.com/api
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /index.html
        name: Cache-Control
        value: no-cache

  # Backend - Node.js API
  - type: web
    name: paketshop-api
    runtime: node
    buildCommand: cd server && npm install && npm run build
    startCommand: cd server && npm start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_NAME
        value: Akramjon (Admin)
      - key: ADMIN_SESSION_SECRET
        sync: false
      - key: ADMIN_MAX_LOGIN_ATTEMPTS
        value: "5"
      - key: ADMIN_LOGIN_WINDOW_MINUTES
        value: "15"
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_CHAT_ID
        sync: false
      - key: WEBAPP_URL
        value: https://paketshop-frontend.onrender.com
    healthCheckPath: /health
